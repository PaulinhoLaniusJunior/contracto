<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <script defer src="../js/login.js"></script>
</head>
<body>
    <div class="container">
        <div class="form-container sign-in-container">
            <form id="loginForm">
                <h1>Entrar</h1>
                <span>ou use sua conta de email</span>
                <input type="email" id="login_email" placeholder="Email" required />
                <input type="password" id="login_password" placeholder="Senha" required />
                <a href="#">Esqueceu sua senha?</a>
                <button type="submit">Entrar</button>
                <p>Não tem conta? <a href="register.html">Registre-se</a></p>
                <div id="login_message" style="color: red;"></div> <!-- Adicionado -->
            </form>
        </div>
    </div>
</body>
</html>
